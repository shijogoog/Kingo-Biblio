spring.application.name=kingo_bibio
# 1. Connexion à la base de données
# Remplace 'ton_utilisateur' et 'ton_mot_de_passe' par tes accès MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotheque_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuration Hibernate (le moteur qui fait le lien Java <-> SQL)
# 'update' permet à Hibernate de mettre à jour les tables automatiquement si besoin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. Configuration du serveur web
server.port=8080

# 4. Version de l'application (pour ton interface)
info.app.version=1.0.0